<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MOODSPOT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body {
  background: #D8D0F8;
  font-family: 'Pretendard Variable', 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
#root {
  width: 100%;
  max-width: 390px;
  min-height: 100vh;
  background: #FAFAFE;
  position: relative;
  overflow-x: hidden;
  box-shadow: 0 0 60px rgba(0,0,0,0.2);
}
.screen-wrap {
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 72px;
}
.screen-wrap::-webkit-scrollbar { display: none; }
.full-screen {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.slide-in { animation: slideIn 0.22s ease-out; }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
input, textarea { outline: none; font-family: inherit; }
button { font-family: inherit; }
.map-bg {
  background: linear-gradient(135deg, #E8E3F8 0%, #EAF0FF 50%, #E4EAF8 100%);
  position: relative;
  overflow: hidden;
}
.map-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(150,140,200,0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(150,140,200,0.12) 1px, transparent 1px);
  background-size: 36px 36px;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ── TOKENS ── */
const C = {
  primary:   '#7C72E3',
  primaryD:  '#6558D8',
  primaryL:  '#EDEAFF',
  primaryM:  '#C4BEFF',
  bg:        '#FAFAFE',
  card:      '#FFFFFF',
  border:    '#EBEBF8',
  textDark:  '#1A1833',
  textGray:  '#94A3B8',
  textLight: '#B8C0CC',
  pink:      '#FDA4AF',
};

/* ── STATUS BAR (제거됨 — 실제 구현에서는 OS가 표시) ── */

/* ── TAG ── */
const Tag = ({ children }) => (
  <span style={{background:C.primaryL,color:C.primary,fontSize:11,fontWeight:600,
    padding:'3px 9px',borderRadius:100,display:'inline-block',lineHeight:1.4}}>
    {children}
  </span>
);

/* ── CHIP ── */
const Chip = ({ label, active, onClick }) => (
  <button onClick={onClick} style={{
    background: active ? C.primary : C.card,
    color: active ? '#fff' : C.textGray,
    border: `1.5px solid ${active ? C.primary : C.border}`,
    borderRadius:100, padding:'7px 16px', fontSize:13, fontWeight:600,
    cursor:'pointer', whiteSpace:'nowrap', transition:'all 0.15s',
  }}>{label}</button>
);

/* ── BACK BUTTON ── */
const BackBtn = ({ onBack, dark }) => (
  <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',
    padding:'4px 4px 4px 0',display:'flex',alignItems:'center'}}>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M15 18l-6-6 6-6" stroke={dark?'#fff':C.textDark} strokeWidth="2.2"
        strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  </button>
);

/* ── TAB BAR ── */
const tabs = [
  { id:'home',     label:'홈',
    icon:(a)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 12L12 3l9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke={a?C.primary:C.textLight} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> },
  { id:'recommend',label:'추천',
    icon:(a)=><svg width="22" height="22" viewBox="0 0 24 24" fill={a?C.primary:'none'}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke={a?C.primary:C.textLight} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> },
  { id:'map',      label:'지도',
    icon:(a)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" stroke={a?C.primary:C.textLight} strokeWidth="2"/><circle cx="12" cy="10" r="3" stroke={a?C.primary:C.textLight} strokeWidth="2"/></svg> },
  { id:'courses',  label:'추천코스',
    icon:(a)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-1.447-.894L15 9m0 8V9M9 7l6 2" stroke={a?C.primary:C.textLight} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> },
  { id:'mypage',   label:'마이페이지',
    icon:(a)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke={a?C.primary:C.textLight} strokeWidth="2" strokeLinecap="round"/><circle cx="12" cy="7" r="4" stroke={a?C.primary:C.textLight} strokeWidth="2"/></svg> },
];

const TabBar = ({ current, onChange }) => (
  <div style={{
    position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)',
    width:'100%', maxWidth:390, background:'#fff',
    borderTop:`1px solid ${C.border}`, display:'flex',
    padding:'10px 0 20px', zIndex:100,
    boxShadow:'0 -4px 16px rgba(0,0,0,0.06)',
  }}>
    {tabs.map(t => (
      <button key={t.id} onClick={() => onChange(t.id)} style={{
        flex:1, display:'flex', flexDirection:'column', alignItems:'center',
        gap:4, background:'none', border:'none', cursor:'pointer',
        color: current===t.id ? C.primary : C.textLight,
      }}>
        {t.icon(current===t.id)}
        <span style={{fontSize:10, fontWeight: current===t.id ? 700 : 500,
          color: current===t.id ? C.primary : C.textLight}}>{t.label}</span>
      </button>
    ))}
  </div>
);

/* ══════════════════════════════════════
   01 HOME
══════════════════════════════════════ */
const HomeScreen = ({ nav }) => {
  const [input, setInput] = useState('');
  const emotions = [
    { label:'평온해요',       emoji:'😊', bg:'#FFF9E6', c:'#D97706' },
    { label:'우울해요',       emoji:'😢', bg:'#EFF6FF', c:'#2563EB' },
    { label:'스트레스에요',   emoji:'😤', bg:'#FFF1F2', c:'#DC2626' },
    { label:'힐링이 필요해요',emoji:'🌿', bg:'#F0FDF4', c:'#16A34A' },
  ];
  return (
    <div className="screen-wrap" style={{background:C.bg}}>

      <div style={{padding:'8px 20px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:14,fontWeight:800,color:C.primary,letterSpacing:1.5}}>MOODSPOT</span>
        <button style={{background:'none',border:'none',cursor:'pointer',padding:4}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
              stroke={C.textDark} strokeWidth="2" strokeLinecap="round"/>
          </svg>
        </button>
      </div>

      <div style={{padding:'24px 20px 20px'}}>
        <h1 style={{fontSize:26,fontWeight:900,color:C.textDark,lineHeight:1.3,
          letterSpacing:-0.5,marginBottom:8}}>오늘 기분이<br/>어떤가요?</h1>
        <p style={{fontSize:14,color:C.textGray,lineHeight:1.7}}>
          당신의 감정에 맞는 문화 경험을 추천해드릴게요</p>
      </div>

      {/* Emotion chips */}
      <div style={{padding:'0 20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
        {emotions.map(e => (
          <button key={e.label} onClick={() => nav('chat')} style={{
            background:e.bg, border:`1.5px solid ${e.bg}`, borderRadius:16,
            padding:'16px 14px', cursor:'pointer', display:'flex',
            alignItems:'center', gap:10, textAlign:'left',
          }}>
            <span style={{fontSize:26}}>{e.emoji}</span>
            <span style={{fontSize:13,fontWeight:600,color:e.c,lineHeight:1.3}}>{e.label}</span>
          </button>
        ))}
      </div>

      {/* Input */}
      <div style={{padding:'0 20px 24px'}}>
        <div style={{display:'flex',alignItems:'center',background:C.card,
          border:`1.5px solid ${C.border}`,borderRadius:14,padding:'4px 4px 4px 16px',gap:8}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&nav('chat')}
            placeholder="지금 기분을 입력해보세요..."
            style={{flex:1,border:'none',background:'transparent',fontSize:14,
              color:C.textDark,padding:'10px 0'}}/>
          <button onClick={()=>nav('chat')} style={{
            background:C.primary,border:'none',borderRadius:10,
            width:40,height:40,cursor:'pointer',display:'flex',
            alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M5 12h14M12 5l7 7-7 7" stroke="#fff" strokeWidth="2.2"
                strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      {/* Today prescription */}
      <div style={{padding:'0 20px 20px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span style={{fontSize:15,fontWeight:700,color:C.textDark}}>오늘의 문화 처방</span>
          <span onClick={()=>nav('prescription')} style={{fontSize:12,color:C.primary,fontWeight:600,cursor:'pointer'}}>더보기 &gt;</span>
        </div>
        <div style={{display:'flex',gap:10,overflowX:'auto',paddingBottom:4}}>
          {[
            {l:'몰입형 미디어아트 전시',e:'🎨',bg:'#EDE9FF'},
            {l:'조용한 독립서점',e:'📚',bg:'#F0FDF4'},
            {l:'한적한 북카페',e:'☕',bg:'#FFF9E6'},
          ].map(c=>(
            <div key={c.l} onClick={()=>nav('prescription')} style={{
              background:c.bg,borderRadius:14,padding:'20px 14px',
              minWidth:115,cursor:'pointer',flexShrink:0}}>
              <div style={{fontSize:30,marginBottom:8}}>{c.e}</div>
              <div style={{fontSize:12,fontWeight:600,color:C.textDark,lineHeight:1.4}}>{c.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Hot */}
      <div style={{padding:'0 20px 20px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span style={{fontSize:15,fontWeight:700,color:C.textDark}}>지금 뜨는 경험 🔥</span>
          <span style={{fontSize:12,color:C.primary,fontWeight:600,cursor:'pointer'}}>더보기 &gt;</span>
        </div>
        {[
          {t:'감성 가득한 북카페 데이트 코스',time:'3시간 10분',likes:'1.2K'},
          {t:'혼자서도 좋은 힐링 코스',time:'2시간 40분',likes:'842'},
        ].map((item,i)=>(
          <div key={i} onClick={()=>nav('courseDetail')} style={{
            background:C.card,border:`1.5px solid ${C.border}`,borderRadius:14,
            padding:'14px 16px',marginBottom:10,cursor:'pointer',
            display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:14,fontWeight:600,color:C.textDark,marginBottom:4}}>{item.t}</div>
              <div style={{fontSize:12,color:C.textGray}}>{item.time}</div>
            </div>
            <span style={{fontSize:13,color:C.pink,fontWeight:700}}>♥ {item.likes}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ══════════════════════════════════════
   LOCATION PICKER MODAL (bottom sheet)
══════════════════════════════════════ */
const AREAS = ['강남·역삼','홍대·연남','이태원·경리단','종로·광화문','성수·건대','마포·합정','여의도','잠실·송파'];

const LocationModal = ({ onSelect, onClose }) => {
  const [search, setSearch] = useState('');
  const filtered = AREAS.filter(a => a.includes(search));
  return (
    <div style={{position:'fixed',inset:0,zIndex:200,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
      {/* Dim */}
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)'}}/>
      {/* Sheet */}
      <div style={{position:'relative',background:C.card,borderRadius:'24px 24px 0 0',
        padding:'20px 20px 40px',zIndex:1,maxHeight:'70vh',display:'flex',flexDirection:'column'}}>
        {/* Handle */}
        <div style={{width:40,height:4,background:C.border,borderRadius:2,margin:'0 auto 18px'}}/>
        <div style={{fontSize:17,fontWeight:800,color:C.textDark,marginBottom:4}}>어디서 경험하고 싶으세요?</div>
        <div style={{fontSize:13,color:C.textGray,marginBottom:16}}>지역을 선택하면 근처 장소를 추천해드려요</div>

        {/* GPS button */}
        <button onClick={()=>onSelect('현재 위치')} style={{
          display:'flex',alignItems:'center',gap:10,background:C.primaryL,
          border:`1.5px solid ${C.primaryM}`,borderRadius:14,padding:'13px 16px',
          marginBottom:14,cursor:'pointer',width:'100%',textAlign:'left'}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:C.primary,
            display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="3" fill="#fff"/>
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
              <circle cx="12" cy="12" r="8" stroke="#fff" strokeWidth="1.5" strokeDasharray="3,2"/>
            </svg>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:C.primary}}>현재 위치 사용</div>
            <div style={{fontSize:12,color:C.textGray}}>GPS로 내 위치 자동 감지</div>
          </div>
        </button>

        {/* Search */}
        <div style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,
          padding:'10px 14px',display:'flex',gap:8,alignItems:'center',marginBottom:14}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="8" stroke={C.textGray} strokeWidth="2"/>
            <path d="m21 21-4.35-4.35" stroke={C.textGray} strokeWidth="2" strokeLinecap="round"/>
          </svg>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="지역 검색 (예: 강남, 홍대)"
            style={{border:'none',background:'transparent',fontSize:14,color:C.textDark,flex:1}}/>
        </div>

        {/* Area grid */}
        <div style={{overflowY:'auto',flex:1}}>
          <div style={{fontSize:11,color:C.textGray,fontWeight:600,letterSpacing:0.5,
            marginBottom:10,textTransform:'uppercase'}}>인기 지역</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {filtered.map(area=>(
              <button key={area} onClick={()=>onSelect(area)} style={{
                background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,
                padding:'12px 14px',cursor:'pointer',textAlign:'left',
                display:'flex',alignItems:'center',gap:8,
                transition:'all 0.15s',
              }}>
                <span style={{fontSize:16}}>📍</span>
                <span style={{fontSize:13,fontWeight:600,color:C.textDark}}>{area}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════
   02 AI CHAT
══════════════════════════════════════ */
const AIChatScreen = ({ nav, back, location, setLocation }) => {
  const [locationPicked, setLocationPicked] = useState(!!location);
  const [showLocationModal, setShowLocationModal] = useState(false);
  const [msgs, setMsgs] = useState([
    {id:1,from:'ai',text:'오늘 많이 지치셨네요 😪\n잠시 쉬어갈 수 있는 공간을\n추천해드릴게요'},
    {id:2,from:'user',text:'네, 조용한 곳이 좋아요'},
    {id:3,from:'ai',text:'좋아요! 조용하고 편안하게\n마음을 회복할 수 있는\n경험을 추천할게요 🌿\n\n어디 근처에서 경험하고 싶으신가요? 📍'},
  ]);
  const [input, setInput] = useState('');
  const bottomRef = useRef(null);
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs,locationPicked]);

  const handleLocationSelect = (area) => {
    setShowLocationModal(false);
    setLocation(area);
    setLocationPicked(true);
    setMsgs(m=>[...m,
      {id:Date.now(),from:'user',text:`📍 ${area}`},
      {id:Date.now()+1,from:'ai',
        text:`${area} 근처에서 찾아볼게요! 🗺️\n딱 맞는 문화 경험을 준비했어요 ✨`},
    ]);
  };

  const send = () => {
    if(!input.trim()) return;
    const text = input; setInput('');
    setMsgs(m=>[...m,{id:Date.now(),from:'user',text}]);
    setTimeout(()=>{
      setMsgs(m=>[...m,{id:Date.now()+1,from:'ai',text:'그렇군요! 딱 맞는 경험을 찾아볼게요 ✨'}]);
    }, 700);
  };

  const AiAvatar = () => (
    <div style={{width:30,height:30,borderRadius:'50%',flexShrink:0,
      background:`linear-gradient(135deg,${C.primary},#A855F7)`,
      display:'flex',alignItems:'center',justifyContent:'center',
      color:'#fff',fontSize:12,fontWeight:800}}>M</div>
  );

  return (
    <div className="full-screen" style={{background:C.bg}}>
      {showLocationModal && <LocationModal onSelect={handleLocationSelect} onClose={()=>setShowLocationModal(false)}/>}

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'8px 20px 12px',borderBottom:`1px solid ${C.border}`,background:C.card}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <BackBtn onBack={back}/>
          <div style={{width:36,height:36,borderRadius:'50%',
            background:`linear-gradient(135deg,${C.primary},#A855F7)`,
            display:'flex',alignItems:'center',justifyContent:'center',
            color:'#fff',fontSize:15,fontWeight:800}}>M</div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:C.textDark}}>MOOD AI</div>
            <div style={{fontSize:11,color:'#22C55E',display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:'#22C55E'}}/>온라인
            </div>
          </div>
        </div>
        {/* Location badge in header */}
        {location && (
          <button onClick={()=>setShowLocationModal(true)} style={{
            display:'flex',alignItems:'center',gap:5,background:C.primaryL,
            border:`1px solid ${C.primaryM}`,borderRadius:100,
            padding:'5px 11px',cursor:'pointer'}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" fill={C.primary}/>
              <circle cx="12" cy="10" r="3" fill="#fff"/>
            </svg>
            <span style={{fontSize:11,fontWeight:700,color:C.primary}}>{location}</span>
          </button>
        )}
        {!location && <span style={{color:C.textGray,fontSize:18,cursor:'pointer'}}>···</span>}
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'16px 16px 8px',
        display:'flex',flexDirection:'column',gap:12}}>
        {msgs.map(msg=>(
          <div key={msg.id} style={{display:'flex',
            justifyContent:msg.from==='ai'?'flex-start':'flex-end',
            alignItems:'flex-end',gap:8}}>
            {msg.from==='ai' && <AiAvatar/>}
            <div style={{
              maxWidth:'72%',padding:'12px 14px',whiteSpace:'pre-line',
              borderRadius:msg.from==='ai'?'4px 16px 16px 16px':'16px 4px 16px 16px',
              background:msg.from==='ai'?C.card:C.primary,
              color:msg.from==='ai'?C.textDark:'#fff',
              fontSize:14,lineHeight:1.6,
              border:msg.from==='ai'?`1.5px solid ${C.border}`:'none',
            }}>{msg.text}</div>
          </div>
        ))}

        {/* Emotion tags */}

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
const App = () => {
  const [tab,    setTab]      = useState('home');
  const [screen, setScreen]   = useState('home');
  const [stack,  setStack]    = useState(['home']);
  const [location, setLocation] = useState('');

  const nav = (to) => { setStack(s=>[...s, to]); setScreen(to); };
  const back = () => {
    const s = stack.slice(0,-1);
    if(!s.length) return;
    setStack(s); setScreen(s[s.length-1]);
  };
  const changeTab = (t) => { setTab(t); setScreen(t); setStack([t]); };

  const noTab = ['chat','prescription','course','courseDetail'].includes(screen);

  const lp = { location, setLocation };
  const render = () => {
    const p = { nav, back, ...lp };
    switch(screen) {
      case 'home':         return <HomeScreen {...p}/>;
      case 'chat':         return <AIChatScreen {...p}/>;
      case 'prescription': return <PrescriptionScreen {...p}/>;
      case 'recommend':
      case 'places':       return <PlacesScreen {...p}/>;
      case 'course':       return <CourseScreen {...p}/>;
      case 'map':          return <MapScreen {...p}/>;
      case 'courses':      return <CourseListScreen {...p}/>;
      case 'courseDetail': return <CourseDetailScreen {...p}/>;
      case 'analysis':     return <AnalysisScreen {...p}/>;
      case 'mypage':       return <MyPageScreen {...p}/>;
      default:             return <HomeScreen {...p}/>;
    }
  };

  return (
    <div>
      <div className="slide-in" key={screen}>{render()}</div>
      {!noTab && <TabBar current={tab} onChange={changeTab}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
