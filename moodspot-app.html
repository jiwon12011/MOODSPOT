/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
const App = () => {
  const [tab,    setTab]      = useState('home');
  const [screen, setScreen]   = useState('home');
  const [stack,  setStack]    = useState(['home']);
  const [location, setLocation] = useState('');
  const [selectedPlace, setSelectedPlace] = useState(PLACE_DATA[0]);
  const [selectedCourse, setSelectedCourse] = useState(COURSE_DATA[0]);
  const [savedPlaceIds, setSavedPlaceIds] = useState(['storage','underbox']);
  const [likedPlaceIds, setLikedPlaceIds] = useState(['arte']);
  const [likedCourseIds, setLikedCourseIds] = useState(['date-cafe']);
  const [startedCourseId, setStartedCourseId] = useState('');
  const [toast, setToast] = useState('');
  const toastRef = useRef(null);

  const flash = (msg) => {
    setToast(msg);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(()=>setToast(''), 1500);
  };
  const toggleSavedPlace = (id) => setSavedPlaceIds(s => {
    const has = s.includes(id);
    flash(has ? '저장한 장소에서 제거했어요' : '장소를 저장했어요');
    return has ? s.filter(x=>x!==id) : [...s,id];
  });
  const toggleLikedPlace = (id) => setLikedPlaceIds(s => {
    const has = s.includes(id);
    flash(has ? '좋아요를 취소했어요' : '좋아요에 추가했어요');
    return has ? s.filter(x=>x!==id) : [...s,id];
  });
  const toggleLikedCourse = (id) => setLikedCourseIds(s => {
    const has = s.includes(id);
    flash(has ? '좋아요한 코스에서 제거했어요' : '코스를 좋아요에 추가했어요');
    return has ? s.filter(x=>x!==id) : [...s,id];
  });
  const startCourse = (id) => {
    setStartedCourseId(id);
    flash('코스를 시작했어요. 지도에서 순서를 확인해보세요.');
  };

  const nav = (to, payload={}) => {
    if (payload.place) setSelectedPlace(payload.place);
    if (payload.course) setSelectedCourse(payload.course);
    setStack(s=>[...s, to]); setScreen(to);
  };
  const back = () => {
    const s = stack.slice(0,-1);
    if(!s.length) return;
    setStack(s); setScreen(s[s.length-1]);
  };
  const changeTab = (t) => { setTab(t); setScreen(t); setStack([t]); };

  const noTab = ['chat','prescription','course','courseDetail','placeDetail','courseEdit',
    'savedPlaces','likedCourses','createdCourses','reviews','settings','notices','support',
    'notifications','search','filter'].includes(screen);

  const lp = { location, setLocation };
  const render = () => {
    const p = { nav, back, ...lp, savedPlaceIds, likedPlaceIds, likedCourseIds, startedCourseId,
      toggleSavedPlace, toggleLikedPlace, toggleLikedCourse, startCourse };
    switch(screen) {
      case 'home':         return <HomeScreen {...p}/>;
      case 'chat':         return <AIChatScreen {...p}/>;
      case 'prescription': return <PrescriptionScreen {...p}/>;
      case 'recommend':
      case 'places':       return <PlacesScreen {...p}/>;
      case 'course':       return <CourseScreen {...p} course={selectedCourse}/>;
      case 'map':          return <MapScreen {...p}/>;
      case 'courses':      return <CourseListScreen {...p}/>;
      case 'courseDetail': return <CourseDetailScreen {...p} course={selectedCourse}/>;
      case 'placeDetail':  return <PlaceDetailScreen {...p} place={selectedPlace}/>;
      case 'courseEdit':   return <CourseEditScreen {...p} course={selectedCourse}/>;
      case 'savedPlaces':  return <CollectionScreen {...p} title="저장한 장소" sub="나중에 가고 싶은 공간" mode="places"/>;
      case 'likedCourses': return <CollectionScreen {...p} title="좋아요한 코스" sub="다시 보고 싶은 하루 흐름" mode="courses"/>;
      case 'createdCourses': return <CollectionScreen {...p} title="내가 만든 코스" sub="직접 조합한 감정 코스" mode="courses" collection="created"/>;
      case 'reviews':      return <ReviewScreen {...p}/>;
      case 'settings':     return <InfoPage {...p} title="설정" sub="추천 경험을 내 방식대로 조정해요" type="settings"/>;
      case 'notices':      return <InfoPage {...p} title="공지사항" sub="MOODSPOT 업데이트 소식" type="notices"/>;
      case 'support':      return <InfoPage {...p} title="고객센터" sub="도움이 필요할 때 확인하세요" type="support"/>;
      case 'notifications': return <NotificationsScreen {...p}/>;
      case 'search':       return <SearchScreen {...p}/>;
      case 'filter':       return <FilterScreen {...p}/>;
      case 'analysis':     return <AnalysisScreen {...p}/>;
      case 'mypage':       return <MyPageScreen {...p}/>;
      default:             return <HomeScreen {...p}/>;
    }
  };

  return (
    <div>
      <div className="slide-in" key={screen}>{render()}</div>
      {!noTab && <TabBar current={tab} onChange={changeTab}/>}
      <Toast message={toast}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
